<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title | default: site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body>
  <header class="site-header">
    <div class="container inner">
      <a class="brand" href="{{ '/' | relative_url }}" aria-label="DeltaZulu home">
        <picture>
          <source srcset="{{ '/assets/images/logo-light.png' | relative_url }}" media="(prefers-color-scheme: dark)">
          <img src="{{ '/assets/images/logo-dark.png' | relative_url }}" alt="DeltaZulu logo" class="brand-logo">
        </picture>
        <div>
          DeltaZulu
          <small>Security infrastructure</small>
        </div>
      </a>
      <nav class="top-nav" aria-label="Primary">
        <a href="#scope">Scope</a>
        <a href="#principles">Principles</a>
        <a href="#contact">Contact</a>
      </nav>
    </div>
  </header>

  <main>
    {{ content }}
  </main>

  <footer class="footer">
    <div class="container">© {{ 'now' | date: '%Y' }} DeltaZulu</div>
  </footer>
</body>
</html>
